<!DOCTYPE html>
<html>
<head>
<title>AI Insurance Agent</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container {
    display:flex;
    height:100vh;
}

.dashboard {
    width:70%;
    padding:20px;
}

.columns {
    display:flex;
    gap:10px;
}

.col {
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    width:25%;
}

.card {
    background:#334155;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

.chat {
    width:30%;
    border-left:1px solid #333;
    display:flex;
    flex-direction:column;
}

.messages {
    flex:1;
    overflow:auto;
    padding:10px;
}

.input-bar {
    display:flex;
    padding:10px;
    background:#1e293b;
}

button {
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="dashboard">
<h2>AI Insurance Dashboard</h2>

<div class="columns">
<div class="col"><h3>Auto</h3><div id="auto"></div></div>
<div class="col"><h3>Health</h3><div id="health"></div></div>
<div class="col"><h3>Life</h3><div id="life"></div></div>
<div class="col"><h3>Property</h3><div id="property"></div></div>
</div>
</div>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="input-bar">
<input type="file" id="file" hidden>

<button onclick="document.getElementById('file').click()">📁</button>
<button onclick="startRecording()">🎤 Start</button>
<button onclick="stopRecording()">⏹ Stop</button>
<button onclick="upload()">⬆️</button>
</div>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
